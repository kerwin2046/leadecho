# Isolated E2E stack — Postgres + Redis only (backend & dashboard run natively).
# Distinct project name + ports so it never collides with the dokploy stack.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: leadecho-e2e-postgres
    ports:
      - "127.0.0.1:15433:5432"
    environment:
      POSTGRES_USER: leadecho
      POSTGRES_PASSWORD: leadecho
      POSTGRES_DB: leadecho_dev
    volumes:
      - e2e_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadecho"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: leadecho-e2e-redis
    ports:
      - "127.0.0.1:16380:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  e2e_pgdata:
